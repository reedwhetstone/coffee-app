    <text x="0" y="130" class="serif cream" font-size="86" font-weight="700" letter-spacing="-2">Source coffee with</text>
    <text x="0" y="222" class="serif cream" font-size="86" font-weight="700" letter-spacing="-2">the whole market</text>
    <text x="0" y="314" class="serif cream" font-size="86" font-weight="700" letter-spacing="-2">already mapped.</text>
    <text x="4" y="378" class="sans muted" font-size="23">41+ importers, daily listings, delistings, price movement,</text>
    <text x="4" y="412" class="sans muted" font-size="23">process evidence, and origin benchmarks in one procurement cockpit.</text>

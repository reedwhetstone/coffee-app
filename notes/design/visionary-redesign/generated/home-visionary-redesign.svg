      <rect width="430" height="176" rx="26" fill="#fff7e8" fill-opacity="0.08" stroke="#fff0d0" stroke-opacity="0.15"/>
      <text x="28" y="42" class="serif cream" font-size="27" font-weight="700">Yemen Ismaili</text>
      <text x="28" y="76" class="sans muted" font-size="15">Natural · tiny dense beans · scarce</text>
      <text x="28" y="128" class="sans amber" font-size="30" font-weight="900">$94.00/lb</text>
      <rect x="274" y="104" width="126" height="36" rx="18" fill="#f6b35e" fill-opacity="0.14"/>
      <text x="301" y="127" class="sans amber" font-size="13" font-weight="900">SCARCE</text>

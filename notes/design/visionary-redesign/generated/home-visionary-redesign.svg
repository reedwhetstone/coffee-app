        <text x="24" y="38" class="sans muted" font-size="13" font-weight="800">CATALOG COVERAGE</text>
        <text x="24" y="82" class="serif cream" font-size="32" font-weight="700">1,064 lots</text>
        <text x="24" y="116" class="sans amber" font-size="20" font-weight="900">41+ importers</text>
      </g>
      <g transform="translate(0 278)">
        <rect width="528" height="210" rx="28" fill="#071f23" fill-opacity="0.72" stroke="#49ead7" stroke-opacity="0.22"/>
        <text x="28" y="42" class="sans cream" font-size="17" font-weight="900">Price index corridor</text>
        <polyline points="32,156 94,132 154,142 216,86 280,98 342,74 406,110 492,58" fill="none" stroke="#49ead7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="32,174 94,168 154,152 216,146 280,126 342,136 406,118 492,104" fill="none" stroke="#f6b35e" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 12"/>
        <g class="sans muted" font-size="12">
          <text x="32" y="190">Brazil</text><text x="142" y="190">Guatemala</text><text x="288" y="190">Ethiopia</text><text x="430" y="190">Yemen</text>
        </g>
      </g>
    </g>

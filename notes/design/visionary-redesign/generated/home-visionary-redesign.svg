<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Purveyors visionary homepage redesign</title>
  <desc id="desc">A dark premium market intelligence homepage concept with live coffee market cards, charts, and catalog previews.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#150f0a"/>
      <stop offset="0.48" stop-color="#28170d"/>
      <stop offset="1" stop-color="#061d22"/>
    </linearGradient>
    <radialGradient id="halo" cx="58%" cy="28%" r="58%">
      <stop offset="0" stop-color="#f6b35e" stop-opacity="0.45"/>
      <stop offset="0.45" stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4dc" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .muted { fill: #d7c7ae; opacity: 0.78; }
      .cream { fill: #fff7e8; }
      .amber { fill: #f6b35e; }
      .teal { fill: #49ead7; }
      .stroke { stroke: #fff0d0; stroke-opacity: 0.16; }
      .thin { stroke-width: 1; }
      .chip { fill: #fff7e8; fill-opacity: 0.08; stroke: #fff0d0; stroke-opacity: 0.18; }
    </style>
  </defs>
  <rect width="1600" height="1100" fill="url(#bg)"/>
  <rect width="1600" height="1100" fill="url(#halo)"/>
  <g opacity="0.18" stroke="#fff0d0" stroke-width="1">
    <path d="M0 210H1600M0 410H1600M0 610H1600M0 810H1600"/>
    <path d="M210 0V1100M510 0V1100M810 0V1100M1110 0V1100M1410 0V1100"/>
  </g>
  <g class="sans" transform="translate(88 54)">
    <text x="0" y="24" class="cream" font-size="26" font-weight="800">purveyors.io</text>
    <text x="260" y="23" class="muted" font-size="16">For Buyers</text>
    <text x="380" y="23" class="muted" font-size="16">Pricing</text>
    <text x="468" y="23" class="muted" font-size="16">Market Data</text>
    <text x="600" y="23" class="muted" font-size="16">API</text>
    <text x="660" y="23" class="muted" font-size="16">Docs</text>
    <rect x="1236" y="-14" width="128" height="44" rx="22" fill="#fff7e8" fill-opacity="0.08" stroke="#fff0d0" stroke-opacity="0.18"/>

      <text x="28" y="42" class="serif cream" font-size="27" font-weight="700">Guatemala Huehuetenango</text>
      <text x="28" y="76" class="sans muted" font-size="15">Washed · 1524–1830 MASL · SHB</text>
      <text x="28" y="128" class="sans amber" font-size="30" font-weight="900">$16.00/lb</text>
      <rect x="274" y="104" width="126" height="36" rx="18" fill="#49ead7" fill-opacity="0.14"/>
      <text x="294" y="127" class="sans teal" font-size="13" font-weight="900">HIGH CONF.</text>

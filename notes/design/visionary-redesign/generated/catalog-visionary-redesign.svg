    <text x="0" y="88" class="sans muted" font-size="20">A sourcing desk for live lots, price intelligence, and process transparency across 41+ importers.</text>
    <rect x="1130" y="14" width="258" height="52" rx="26" fill="#f6b35e"/><text x="1171" y="47" class="sans" fill="#1b1009" font-size="17" font-weight="900">Copy filtered link</text>
    <rect x="1404" y="14" width="96" height="52" rx="26" class="chip"/><text x="1433" y="47" class="sans cream" font-size="17" font-weight="800">API</text>
  </g>

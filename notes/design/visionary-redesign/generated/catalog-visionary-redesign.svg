<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Purveyors visionary catalog redesign</title>
  <desc id="desc">A redesigned public catalog workspace with filter rail, market pulse, coffee cards, process transparency, and price ladder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f100c"/><stop offset="0.52" stop-color="#20130d"/><stop offset="1" stop-color="#092429"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff2d5" stop-opacity="0.13"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.055"/></linearGradient>
    <radialGradient id="glow" cx="86%" cy="4%" r="70%"><stop offset="0" stop-color="#49ead7" stop-opacity="0.26"/><stop offset="0.5" stop-color="#f6b35e" stop-opacity="0.12"/><stop offset="1" stop-color="#000" stop-opacity="0"/></radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.36"/></filter>
    <style>.sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.serif{font-family:Georgia,'Times New Roman',serif}.cream{fill:#fff7e8}.muted{fill:#d8c7af;opacity:.78}.amber{fill:#f6b35e}.teal{fill:#49ead7}.panel{fill:url(#panel);stroke:#fff0d0;stroke-opacity:.16}.chip{fill:#fff7e8;fill-opacity:.08;stroke:#fff0d0;stroke-opacity:.16}</style>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/><rect width="1600" height="1200" fill="url(#glow)"/>
  <g class="sans" transform="translate(64 46)">
    <text x="0" y="24" class="cream" font-size="25" font-weight="900">purveyors.io</text><text x="240" y="23" class="muted" font-size="16">Catalog</text><text x="330" y="23" class="muted" font-size="16">Market Data</text><text x="462" y="23" class="muted" font-size="16">API</text><text x="520" y="23" class="muted" font-size="16">Docs</text>
    <rect x="1212" y="-12" width="126" height="42" rx="21" class="chip"/><text x="1247" y="14" class="cream" font-size="15" font-weight="800">Sign in</text><rect x="1354" y="-12" width="136" height="42" rx="21" fill="#f6b35e"/><text x="1386" y="14" fill="#1b1009" font-size="15" font-weight="900">See plans</text>
  </g>

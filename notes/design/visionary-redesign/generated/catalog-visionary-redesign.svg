    <g transform="translate(562 0)" filter="url(#shadow)"><rect width="530" height="312" rx="34" class="panel"/><g class="sans" transform="translate(28 32)"><text x="0" y="0" class="serif cream" font-size="30" font-weight="700">Jamaica Blue Mountain</text><text x="0" y="32" class="muted" font-size="14">sea_island · Blue Baron Estate · Washed</text><text x="0" y="88" class="amber" font-size="34" font-weight="900">$101.00/lb</text><rect x="210" y="60" width="96" height="42" rx="21" fill="#f6b35e" fill-opacity="0.16"/><text x="236" y="86" class="amber" font-size="13" font-weight="900">RARE</text><text x="0" y="144" class="cream" font-size="15" font-weight="800">Process analysis</text><text x="0" y="174" class="muted" font-size="14">Fermented with natural spring water · structured disclosure</text><rect y="218" width="474" height="14" rx="7" fill="#fff7e8" fill-opacity="0.1"/><rect y="218" width="420" height="14" rx="7" fill="#f6b35e" fill-opacity="0.75"/><text x="0" y="270" class="muted" font-size="13">Typica · 610–914 MASL · Peaberry</text></g></g>
